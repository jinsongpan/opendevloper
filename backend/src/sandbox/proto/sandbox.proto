syntax = "proto3";

package sandbox;

service SandboxService {
  rpc CreateSandbox(CreateRequest) returns (CreateResponse);
  rpc DestroySandbox(DestroyRequest) returns (DestroyResponse);
  
  rpc CreateFile(CreateFileRequest) returns (CreateFileResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  
  rpc ExecCommand(ExecRequest) returns (ExecResponse);
  rpc ExecCommandStream(ExecRequest) returns (stream ExecStreamResponse);
  rpc RunApplication(RunAppRequest) returns (RunAppResponse);
  rpc InstallDependencies(InstallDepsRequest) returns (InstallDepsResponse);
  rpc RunServer(RunServerRequest) returns (RunServerResponse);
  rpc RunServerStream(RunServerRequest) returns (stream RunServerStreamResponse);
  rpc RunStaticServer(RunStaticServerRequest) returns (RunStaticServerResponse);
  
  rpc GetServers(GetServersRequest) returns (GetServersResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message CreateRequest {
  string image = 1;
  map<string, string> env = 2;
}

message CreateResponse {
  string sandbox_id = 1;
  string work_dir = 2;
}

message DestroyRequest {
  string sandbox_id = 1;
}

message DestroyResponse {
  bool success = 1;
}

message CreateFileRequest {
  string sandbox_id = 1;
  string path = 2;
  string content = 3;
}

message CreateFileResponse {
  bool success = 1;
}

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message ReadFileResponse {
  string content = 1;
}

message ListFilesRequest {
  string sandbox_id = 1;
  string dir = 2;
}

message FileNode {
  string name = 1;
  string path = 2;
  string type = 3;
  repeated FileNode children = 4;
}

message ListFilesResponse {
  repeated FileNode files = 1;
}

message DeleteFileRequest {
  string sandbox_id = 1;
  string path = 2;
}

message DeleteFileResponse {
  bool success = 1;
}

message ExecRequest {
  string sandbox_id = 1;
  string command = 2;
}

message ExecResponse {
  string output = 1;
  int32 exit_code = 2;
}

message ExecStreamResponse {
  string data = 1;
  bool is_error = 2;
}

message RunAppRequest {
  string sandbox_id = 1;
  string command = 2;
}

message RunAppResponse {
  string output = 1;
  int32 exit_code = 2;
}

message InstallDepsRequest {
  string sandbox_id = 1;
}

message InstallDepsResponse {
  string output = 1;
  int32 exit_code = 2;
}

message RunServerRequest {
  string sandbox_id = 1;
  string command = 2;
  string port = 3;
}

message RunServerResponse {
  string output = 1;
  string url = 2;
  int32 port = 3;
  int32 pid = 4;
  int32 exit_code = 5;
}

message RunServerStreamResponse {
  string data = 1;
  int32 port = 2;
  string url = 3;
  bool is_error = 4;
}

message RunStaticServerRequest {
  string sandbox_id = 1;
  string port = 2;
}

message RunStaticServerResponse {
  string url = 1;
  int32 port = 2;
  int32 pid = 3;
}

message GetServersRequest {
  string sandbox_id = 1;
}

message ServerInfo {
  string sandbox_id = 1;
  int32 port = 2;
  string url = 3;
  int32 pid = 4;
  int64 start_time = 5;
}

message GetServersResponse {
  repeated ServerInfo servers = 1;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
}
